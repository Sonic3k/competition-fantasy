spring.application.name=competition-api
server.port=${PORT:8080}

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=true

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Storage (B2 + Bunny CDN)
storage.b2.key-id=${B2_KEY_ID:}
storage.b2.app-key=${B2_APP_KEY:}
storage.b2.bucket=${B2_BUCKET:sonic-hub}
storage.b2.endpoint=${B2_ENDPOINT:s3.us-east-005.backblazeb2.com}
storage.cdn-base=${CDN_BASE:https://sonic-hub.b-cdn.net}
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# Grok / xAI
grok.api-key=${GROK_API_KEY:}
